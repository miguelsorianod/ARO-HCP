apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    app.kubernetes.io/name: kube-prometheus
    app.kubernetes.io/part-of: kube-prometheus
    prometheus: k8s
    role: alert-rules
  name: backend-monitoring-rules
  namespace: monitoring
spec:
  groups:
  - name: backend
    rules:
    - alert: BackendOperationErrorRate
      expr: |
        (sum by (cluster) (rate(backend_failed_operations_total[1h])))
        /
        (sum by (cluster) (rate(backend_operations_total[1h])))
        > 0.05
      for: 5m
      labels:
        severity: info
      annotations:
        description: 'The Backend operation error rate is above 5% for the last hour. Current value: {{ $value | humanizePercentage }}.'
        runbook_url: 'TBD'
        summary: 'High Error Rate on Backend Operations'
    - alert: BackendControllerRetryHotLoop
      # A ratio of retries to total adds that is rate-independent:
      # it stays high regardless of item count or backoff delay.
      # A ratio > 0.5 sustained for 10 minutes means more than half
      # of all queue activity is retries rather than fresh work.
      expr: |
        (
          sum by (name, cluster) (
            max without(prometheus_replica) (
              rate(workqueue_retries_total{namespace="aro-hcp"}[10m])
            )
          )
          /
          sum by (name, cluster) (
            max without(prometheus_replica) (
              rate(workqueue_adds_total{namespace="aro-hcp"}[10m])
            )
          )
        ) > 0.5
      for: 10m
      labels:
        severity: critical
      annotations:
        description: 'Backend controller workqueue {{ $labels.name }} has a retry ratio of > 50% sustained over 10 minutes, indicating most queue activity is failed retries rather than fresh work.'
        runbook_url: 'TBD'
        summary: 'Backend controller workqueue {{ $labels.name }} retry hot loop'
    - alert: BackendControllerQueueDepthHigh
      expr: |
        max by (name, cluster) (
          max without(prometheus_replica) (
            workqueue_depth{namespace="aro-hcp"}
          )
        ) > 10
      for: 5m
      labels:
        severity: warning
      annotations:
        description: 'Backend controller workqueue {{ $labels.name }} has had a depth > 10 for more than 5 minutes, indicating work is accumulating faster than it can be processed.'
        runbook_url: 'TBD'
        summary: 'Backend controller workqueue {{ $labels.name }} depth is high'
